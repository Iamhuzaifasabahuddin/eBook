<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your site description here">
    <meta name="author" content="Your Name Here">
    <meta name="date" content="2026-04-23" />
    <meta name="twitter:image:alt" content="Sample alt text for image">
    <meta name="og:image:alt" content="Sample alt text for Open Graph image">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Organization",
            "name": "Your Organization Name",
            "url": "https://www.example.com",
            "logo": {
                "@type": "ImageObject",
                "url": "https://www.example.com/logo.png"
            }
        }
    </script>
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "LocalBusiness",
            "name": "Local Business Name",
            "address": {
                "@type": "PostalAddress",
                "streetAddress": "123 Main St",
                "addressLocality": "City",
                "addressRegion": "State",
                "postalCode": "12345",
                "addressCountry": "Country"
            }
        }
    </script>
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "FAQPage",
            "mainEntity": [
                {
                    "@type": "Question",
                    "name": "What is FAQ?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "FAQ stands for Frequently Asked Questions."
                    }
                }
            ]
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <title>Your Website Title</title>
</head>
<body>
    <header>
        <h1>Your Website Heading</h1>
    </header>
    <nav>
        <ol itemscope itemtype="https://schema.org/BreadcrumbList">
            <li itemscope itemprop="itemListElement" itemtype="https://schema.org/ListItem">
                <a href="/" itemprop="item">
                    <span itemprop="name">Home</span>
                </a>
                <meta itemprop="position" content="1" />
            </li>
            <li itemscope itemprop="itemListElement" itemtype="https://schema.org/ListItem">
                <a href="/about" itemprop="item">
                    <span itemprop="name">About</span>
                </a>
                <meta itemprop="position" content="2" />
            </li>
        </ol>
    </nav>
    <main>
        <section>
            <h2>Services</h2>
            <div>
                <h3 itemprop="name">Service Name</h3>
                <img src="service-icon.svg" alt="Service Icon" />
            </div>
        </section>
        <section>
            <h2>Testimonials</h2>
            <div itemscope itemtype="https://schema.org/Review">
                <span itemprop="author">John Doe</span>
                <span itemprop="reviewBody">Great service!</span>
            </div>
        </section>
        <section>
            <h2>Pricing</h2>
            <script type="application/ld+json">
                {
                    "@context": "https://schema.org",
                    "@type": "Service",
                    "serviceType": "Your Service",
                    "offers": {
                        "@type": "Offer",
                        "price": "100",
                        "priceCurrency": "USD"
                    }
                }
            </script>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Your Company</p>
    </footer>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</body>
</html>
